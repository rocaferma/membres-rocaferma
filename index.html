      "D0501": {nom: "Dylan Agúndez Carrasco", estat: "Actiu"},
      "J6601": {nom: "Joan Alabart Josa", estat: "Actiu"},
      "M6801": {nom: "Marcel·la Aguiló Jordi", estat: "Actiu"},

      "J0608": {nom: "Joel Vázquez Aragonès", estat: "Actiu"},
      "M0909": {nom: "Martina Garcia Andrade", estat: "Actiu"}
    };

    function obtenirCodiURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("codi");
    }

    function validar(codi) {
      let resultat = document.getElementById("resultat");

      if (membres[codi]) {
        if (membres[codi].estat === "Actiu") {
          resultat.innerHTML = "✅ MEMBRE ACTIU<br>" + membres[codi].nom;
          resultat.style.color = "green";
        } else {
          resultat.innerHTML = "⚠️ MEMBRE NO ACTIU<br>" + membres[codi].nom;
          resultat.style.color = "orange";
        }
      } else {
        resultat.innerHTML = "❌ CODI NO VÀLID";
        resultat.style.color = "red";
      }
    }

    const codiURL = obtenirCodiURL();
    if (codiURL) {
      validar(codiURL.toUpperCase());
    } else {
      document.getElementById("resultat").innerHTML = "Escaneja el QR";
    }
  </script>

</body>
</html>
